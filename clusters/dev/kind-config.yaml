# Cluster local de desenvolvimento — kind (Kubernetes IN Docker)
#
# 1 control-plane + 2 workers, com as portas 80/443 do host mapeadas para o
# nó de control-plane — é por aqui que o NGINX Ingress Controller (hostNetwork
# em dev) recebe todo o tráfego de *.local.dev.
#
# Uso:
#   kind create cluster --name devcluster --config clusters/dev/kind-config.yaml
#
# Idempotência: scripts/bootstrap-dev.sh checa `kind get clusters` antes de
# chamar este arquivo — criar de novo em cima de um cluster existente falha,
# por isso o script nunca chama isso sem checar primeiro.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devcluster

networking:
  # Mantém a CNI padrão do kind (kindnet) — suficiente para o MVP local.
  # NetworkPolicy funciona com kindnet a partir do kind >= 0.20.
  disableDefaultCNI: false
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"

nodes:
  - role: control-plane
    extraPortMappings:
      # HTTP — redireciona para HTTPS no Ingress, mas mantemos o 80 mapeado
      # para permitir o desafio HTTP01 (mesmo que em dev usemos self-signed)
      # e para simular o comportamento real de um LoadBalancer em prod.
      - containerPort: 80
        hostPort: 80
        protocol: TCP
        listenAddress: "127.0.0.1"
      - containerPort: 443
        hostPort: 443
        protocol: TCP
        listenAddress: "127.0.0.1"
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

  - role: worker
  - role: worker

# Feature gates / runtimeConfig herdam o padrão do kind — não há necessidade
# de habilitar nada extra para o escopo deste laboratório (kube-prometheus-stack,
# cert-manager e ArgoCD funcionam com a configuração padrão do kind >= 0.20).
