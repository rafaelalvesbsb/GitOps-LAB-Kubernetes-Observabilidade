; Template de inventário Ansible — copie para inventory.ini e preencha credenciais reais.
; inventory.ini é ignorado pelo Git (.gitignore na raiz) — nunca commitar credenciais reais.

[mgmt]
mgmt-01 ansible_host=192.168.1.105 ansible_user=lab01 ansible_password=CHANGEME ansible_become_password=CHANGEME

[control_plane]
k8s-cp-01 ansible_host=192.168.1.101 ansible_user=lab02 ansible_password=CHANGEME ansible_become_password=CHANGEME
k8s-cp-02 ansible_host=192.168.1.106 ansible_user=lab03 ansible_password=CHANGEME ansible_become_password=CHANGEME
k8s-cp-03 ansible_host=192.168.1.107 ansible_user=lab04 ansible_password=CHANGEME ansible_become_password=CHANGEME

[workers]
k8s-worker-01 ansible_host=192.168.1.108 ansible_user=lab05 ansible_password=CHANGEME ansible_become_password=CHANGEME
k8s-worker-02 ansible_host=192.168.1.109 ansible_user=lab06 ansible_password=CHANGEME ansible_become_password=CHANGEME

[k8s_cluster:children]
control_plane
workers

[all:vars]
ansible_python_interpreter=/usr/bin/python3
; IP virtual flutuante do control-plane (kube-vip) — deve estar livre na LAN e fora do range do DHCP
kube_vip_address=192.168.1.110
kube_vip_interface=eth0
pod_network_cidr=10.244.0.0/16
kube_version="1.30"
; DNS local do lab (role dns-server, roda na mgmt-01) — *.lab.internal -> ingress-nginx
dns_lab_domain=lab.internal
dns_ingress_ip=192.168.1.108
dns_upstream=192.168.1.1
