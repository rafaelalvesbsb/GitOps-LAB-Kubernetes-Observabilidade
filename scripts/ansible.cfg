[defaults]
inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
timeout = 30

# NOTA: "become" do Ansible não é usado neste lab — o sudo das VMs usa um formato de
# prompt que o detector de become do Ansible não reconhece (trava indefinidamente).
# Privilégio é escalado manualmente em cada role via "sudo -S" + stdin.
# Ver scripts/playbooks/roles/common/tasks/main.yml.
