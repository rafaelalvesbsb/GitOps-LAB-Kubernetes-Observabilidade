apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-lab-internal-tls
  namespace: apps
spec:
  secretName: app-lab-internal-tls
  dnsNames:
    - app.lab.internal
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-app
  namespace: apps
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [app.lab.internal]
      secretName: app-lab-internal-tls
  rules:
    - host: app.lab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-app
                port:
                  number: 80
