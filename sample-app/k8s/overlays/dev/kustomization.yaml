apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
resources:
- ../../base
- ingress.yaml
  # O workflow de CI atualiza o newTag aqui (kustomize edit set image) a cada push —
  # é assim que o ArgoCD descobre a nova versão a sincronizar. Ver
  # .github/workflows/ci.yaml.
images:
- name: ghcr.io/rafaelalvesbsb/sample-app
  newName: ghcr.io/rafaelalvesbsb/sample-app
  newTag: 4169d06ae81d363303d82569e9a525c9c5161148
