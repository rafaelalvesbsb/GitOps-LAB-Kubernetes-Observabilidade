# ATENÇÃO: não usado pelo overlay dev — "helm template" (kustomize helmCharts:) ignora
# a pasta crds/ deste chart, então as CRDs do prometheus-operator nunca seriam criadas.
# overlays/dev/monitoring usa fonte Helm nativa do ArgoCD em vez disso (ver
# argocd/apps/dev/monitoring.yaml). Mantido aqui só de referência para um futuro
# overlay de prod, que precisará do mesmo tratamento.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 65.5.1
    releaseName: kube-prometheus-stack
    namespace: monitoring
    valuesFile: values.yaml
