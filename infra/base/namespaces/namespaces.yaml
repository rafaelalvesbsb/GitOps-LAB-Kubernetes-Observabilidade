# Namespaces da plataforma. O nível de Pod Security Standard é definido aqui na base
# como "baseline" (seguro por padrão em qualquer ambiente); o overlay de prod sobrescreve
# para "restricted" via patch (ver infra/overlays/prod/namespaces/).
# Exceção deliberada: o controller usa hostNetwork+hostPort (80/443) porque o cluster
# não tem LoadBalancer cloud nem MetalLB — "baseline" proíbe isso. "privileged" aqui é
# escopado só a este namespace de infraestrutura, não às apps (que continuam baseline).
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
# Exceção deliberada: prometheus-node-exporter precisa de hostNetwork/hostPID/hostPath
# (proc, sys, root) para ler métricas de kernel do host — é assim que node-exporter
# funciona em qualquer cluster, não é peculiaridade deste lab.
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: Namespace
metadata:
  name: dashboard
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: apps
  labels:
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    pod-security.kubernetes.io/enforce: baseline
