# Default-deny + exceções explícitas no namespace "apps" — em AMBOS os ambientes
# (dev e prod), para que bugs de política sejam descobertos no ciclo normal de
# desenvolvimento, não só em produção. Ver claude/docs/ARQUITETURA.md seção 7.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: apps
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-nginx
  namespace: apps
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        # O controller roda com hostNetwork (sem MetalLB no lab — ver
        # infra/overlays/dev/ingress-nginx) — o tráfego chega com o IP do NÓ, não um IP
        # de pod do namespace ingress-nginx, então o namespaceSelector acima por si só
        # não cobre esse tráfego. ipBlock com os IPs dos workers (nodeSelector
        # ingress-ready=true) resolve isso sem abrir pra LAN inteira.
        - ipBlock:
            cidr: 192.168.1.108/32
        - ipBlock:
            cidr: 192.168.1.109/32
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: apps
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: apps
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
