# TLS termina aqui (server.insecure: true no ArgoCD — ver values-patch.yaml).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-lab-internal-tls
  namespace: argocd
spec:
  secretName: argocd-lab-internal-tls
  dnsNames:
    - argocd.lab.internal
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.lab.internal
      secretName: argocd-lab-internal-tls
  rules:
    - host: argocd.lab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: http
