apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 7.7.7
    releaseName: argocd
    namespace: argocd
    valuesFile: ../../../base/argocd/values.yaml
    additionalValuesFiles:
      - values-patch.yaml
resources:
  - ingress.yaml
