# NÃO usado por nenhuma Application atualmente — o Helm release do ArgoCD é gerenciado
# manualmente (helm upgrade), de propósito, para evitar o risco de o ArgoCD derrubar a
# própria gestão de si mesmo. Mantido como referência para uma futura auto-gestão via
# GitOps. O Ingress/Certificate do ArgoCD foi extraído para
# infra/overlays/dev/argocd-ingress/, que tem sua própria Application.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 7.7.7
    releaseName: argocd
    namespace: argocd
    valuesFile: ../../../base/argocd/values.yaml
    additionalValuesFiles:
      - values-patch.yaml
resources:
  - ingress.yaml
