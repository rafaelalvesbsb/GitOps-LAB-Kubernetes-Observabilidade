apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dashboard-lab-internal-tls
  namespace: dashboard
spec:
  secretName: dashboard-lab-internal-tls
  dnsNames:
    - dashboard.lab.internal
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: dashboard
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Headlamp usa token de ServiceAccount para autorização (RBAC), não login — Basic
    # Auth aqui é uma camada extra de proteção no Ingress (mesmo padrão do Prometheus).
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: headlamp-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Autenticação necessária"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [dashboard.lab.internal]
      secretName: dashboard-lab-internal-tls
  rules:
    - host: dashboard.lab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 80
