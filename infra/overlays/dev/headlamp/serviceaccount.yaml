# Dev: autenticação via token de ServiceAccount (read-only). Prod usa OIDC — ver
# claude/docs/ARQUITETURA.md seção 6.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headlamp-admin
  namespace: dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin-view
subjects:
  - kind: ServiceAccount
    name: headlamp-admin
    namespace: dashboard
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-admin-token
  namespace: dashboard
  annotations:
    kubernetes.io/service-account.name: headlamp-admin
type: kubernetes.io/service-account-token
