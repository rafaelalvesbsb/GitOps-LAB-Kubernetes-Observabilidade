apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-lab-internal-tls
  namespace: monitoring
spec:
  secretName: monitoring-lab-internal-tls
  dnsNames:
    - grafana.lab.internal
    - prometheus.lab.internal
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [grafana.lab.internal]
      secretName: monitoring-lab-internal-tls
  rules:
    - host: grafana.lab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-dev-grafana
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Prometheus não tem login nativo — protegido via Basic Auth no Ingress.
    # Secret "prometheus-basic-auth" (htpasswd) é aplicado direto no cluster, nunca
    # commitado no Git (ver claude/docs/AMBIENTE-E-IMPLEMENTACAO.md / handoff.md).
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: prometheus-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Autenticação necessária"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [prometheus.lab.internal]
      secretName: monitoring-lab-internal-tls
  rules:
    - host: prometheus.lab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-dev-kube-promet-prometheus
                port:
                  number: 9090
