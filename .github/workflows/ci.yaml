name: sample-app CI

on:
  push:
    branches: [main]
    paths:
      - "sample-app/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write # necessário para assinatura keyless do cosign (OIDC)

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/sample-app

concurrency:
  group: sample-app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go test
        working-directory: sample-app/src
        run: go test ./... -v

  build-scan-sign-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build e push (tag = sha + latest)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: sample-app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ github.sha }}

      - name: Scan de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - uses: sigstore/cosign-installer@v3

      - name: Assinar imagem (cosign keyless via OIDC)
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"

  promote-dev:
    needs: build-scan-sign-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Atualizar tag da imagem no overlay dev
        working-directory: sample-app/k8s/overlays/dev
        run: kustomize edit set image "${{ env.IMAGE }}=${{ env.IMAGE }}:${{ github.sha }}"

      - name: Abrir PR de promoção (auto-merge — checks já passaram nesta run)
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci/promote-dev-${{ github.sha }}
          commit-message: "ci: promote sample-app to ${{ github.sha }} (dev)"
          title: "Promote sample-app to ${{ github.sha }} (dev)"
          body: |
            Build, test, scan (Trivy) e assinatura (cosign) passaram em ${{ github.sha }}.
            Imagem: `${{ env.IMAGE }}:${{ github.sha }}`

            Auto-merge — ver claude/docs/ARQUITETURA.md seção 3.
          delete-branch: true

      - name: Auto-merge do PR de dev
        if: steps.pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.pull-request-number }}" --merge --delete-branch
