apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/rafaelalvesbsb/GitOps-LAB-Kubernetes-Observabilidade.git
    targetRevision: main
    path: infra/overlays/dev/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # CRDs (ServiceMonitor/PrometheusRule) e os recursos que as usam vêm juntos no
      # mesmo chart — sem isso, o primeiro sync falha porque a CRD ainda não existe
      # no momento do dry-run. selfHeal corrige no próximo ciclo de qualquer forma,
      # mas isso evita o erro/retry inicial.
      - SkipDryRunOnMissingResource=true
