# Fonte Helm nativa (não Kustomize) — necessário porque "helm template" ignora a
# pasta crds/ do chart kube-prometheus-stack. Ver infra/base/monitoring/kustomization.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 65.5.1
      helm:
        valueFiles:
          - $values/infra/base/monitoring/values.yaml
          - $values/infra/overlays/dev/monitoring/values-patch.yaml
    - repoURL: https://github.com/rafaelalvesbsb/GitOps-LAB-Kubernetes-Observabilidade.git
      targetRevision: main
      ref: values
    # Certificate + Ingress do Grafana/Prometheus (Kustomize puro, sem helmCharts).
    - repoURL: https://github.com/rafaelalvesbsb/GitOps-LAB-Kubernetes-Observabilidade.git
      targetRevision: main
      path: infra/overlays/dev/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
